# priorities:
# 0    - read-only
# 1000 - mutually non-conflicting fixers
# none - other fixers

# exclude vendored files
exclude: '^(api/|demo/openseadragon-scalebar\.js)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        priority: 0
      - id: check-merge-conflict
        priority: 0
      - id: check-vcs-permalinks
        priority: 0
      - id: check-yaml
        priority: 0
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        types_or: [python, pyproject]
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        name: Check Python types
        priority: 0
        additional_dependencies:
          - boto3-stubs[s3]
          - types-Pillow
          - types-python-dateutil
          - types-PyYAML
          - types-requests

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: Check spelling with codespell
        priority: 0

  - repo: meta
    hooks:
      - id: check-hooks-apply
        priority: 0
      - id: check-useless-excludes
        priority: 0

  - repo: local
    hooks:
      - id: annotations
        name: Require "from __future__ import annotations"
        priority: 0
        language: pygrep
        types: [python]
        # Allow files with import statement, or of less than two characters.
        # One-character files are allowed because that's the best we can do
        # with paired negative lookbehind and lookahead assertions.  ^ and $
        # don't work because --multiline causes them to match at newlines.
        entry: "(?<!.)(?!.)|\nfrom __future__ import annotations"
        args: [--multiline, --negate]
